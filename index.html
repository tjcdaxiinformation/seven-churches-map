<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>啟示錄七教會互動地理簡報</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 Babel CDN 以在瀏覽器中直接執行 JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto+Sans+TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 自定義內建圖示組件
        const Icons = {
            MapPin: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>
                </svg>
            ),
            ChevronLeft: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="m15 18-6-6 6-6"/>
                </svg>
            ),
            ChevronRight: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            ),
            Info: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
                </svg>
            ),
            MapIcon: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/><path d="M15 5.764v15"/><path d="M9 3.236v15"/>
                </svg>
            ),
            BookOpen: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
            ),
            ExternalLink: ({ size = 16, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
            )
        };

        const churchesData = [
            {
                id: 1,
                name: "以弗所 (Ephesus)",
                turkishName: "Selçuk (塞爾丘克)",
                location: "位於伊茲密爾省 (İzmir)",
                lat: 37.9411,
                lng: 27.3419,
                description: "曾是羅馬亞西亞省的首府，著名的考古遺址。在啟示錄中被提醒要找回「起初的愛心」。",
                modernContext: "現為土耳其最重要的觀光景點之一，擁有保存完好的塞爾蘇斯圖書館。",
                coords: { x: 18, y: 78 },
                color: "bg-blue-500"
            },
            {
                id: 2,
                name: "士每拿 (Smyrna)",
                turkishName: "İzmir (伊茲密爾)",
                location: "土耳其第三大城",
                lat: 38.4237,
                lng: 27.1428,
                description: "七教會中唯一至今仍是繁榮大都市的地點。聖經中被稱為「至死忠心」的教會。",
                modernContext: "現代化的國際港口城市，充滿愛琴海風情，依然保留著古代集市 (Agora) 的遺址。",
                coords: { x: 12, y: 55 },
                color: "bg-emerald-500"
            },
            {
                id: 3,
                name: "別迦摩 (Pergamum)",
                turkishName: "Bergama (貝爾加馬)",
                location: "位於伊茲密爾省北部",
                lat: 39.1325,
                lng: 27.1842,
                description: "以山頂衛城與古代醫療中心聞名。曾擁有世界第二大圖書館。",
                modernContext: "貝爾加馬古城已被列入世界文化遺產，斜度驚人的古劇場是其標誌。",
                coords: { x: 14, y: 22 },
                color: "bg-amber-500"
            },
            {
                id: 4,
                name: "推雅推喇 (Thyatira)",
                turkishName: "Akhisar (阿克希薩爾)",
                location: "位於馬尼薩省 (Manisa)",
                lat: 38.9208,
                lng: 27.8403,
                description: "古代商業發達，以染布業聞名（如賣紫色布疋的呂底亞）。",
                modernContext: "現代城市 Akhisar 已完全覆蓋古城，僅在市中心保留了一小區考古公園。",
                coords: { x: 38, y: 32 },
                color: "bg-purple-500"
            },
            {
                id: 5,
                name: "撒狄 (Sardis)",
                turkishName: "Sart (薩爾特)",
                location: "鄰近薩利赫利 (Salihli)",
                lat: 38.4883,
                lng: 28.0403,
                description: "古代呂底亞王國的首都，曾極其富有。擁有巨大的亞底米神廟與華麗的猶太會堂。",
                modernContext: "位於連接伊茲密爾與安卡拉的公路旁，其修復後的健身房遺址壯觀無比。",
                coords: { x: 42, y: 52 },
                color: "bg-red-500"
            },
            {
                id: 6,
                name: "非拉鐵非 (Philadelphia)",
                turkishName: "Alaşehir (阿拉謝希爾)",
                location: "馬尼薩省東部",
                lat: 38.3491,
                lng: 28.5164,
                description: "意為「弟兄相愛」。因常有地震，城市規模多次重建。聖經稱其為「開了的門」。",
                modernContext: "阿拉謝希爾現以盛產葡萄聞名，市區內仍可見聖約翰大教堂的圓柱遺址。",
                coords: { x: 58, y: 58 },
                color: "bg-orange-500"
            },
            {
                id: 7,
                name: "老底嘉 (Laodicea)",
                turkishName: "Denizli (代尼茲利)",
                location: "鄰近棉堡 (Pamukkale)",
                lat: 37.8361,
                lng: 29.1064,
                description: "古代金融中心，以黑羊毛與眼藥聞名。聖經形容其信仰「不冷不熱」。",
                modernContext: "鄰近著名的石灰岩溫泉地形「棉堡」。近期考古發掘出規模宏大的教堂與街道。",
                coords: { x: 82, y: 82 },
                color: "bg-cyan-500"
            }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState(0);

            const nextSlide = () => setActiveTab((prev) => (prev + 1) % churchesData.length);
            const prevSlide = () => setActiveTab((prev) => (prev - 1 + churchesData.length) % churchesData.length);

            const currentChurch = churchesData[activeTab];
            
            const mapEmbedUrl = `https://maps.google.com/maps?q=${currentChurch.lat},${currentChurch.lng}&t=k&z=15&output=embed`;
            const googleMapLink = `https://www.google.com/maps/search/?api=1&query=${currentChurch.lat},${currentChurch.lng}`;

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 p-4 md:p-8">
                    <header className="max-w-6xl mx-auto mb-8 text-center md:text-left">
                        <h1 className="text-3xl font-bold text-slate-800 flex items-center justify-center md:justify-start gap-2">
                            <Icons.BookOpen className="text-blue-600" size={32} />
                            啟示錄七教會互動地理簡報
                        </h1>
                        <p className="text-slate-500 mt-2">結合 Google 地圖衛星圖標示小亞細亞七教會之歷史與現況</p>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                        <div className="lg:col-span-7 bg-white p-6 rounded-2xl shadow-xl border border-slate-200">
                            <div className="flex items-center justify-between mb-4">
                                <h2 className="text-lg font-semibold flex items-center gap-2 text-slate-700">
                                    <Icons.MapIcon size={20} className="text-slate-400" />
                                    衛星地理位置 (Google Map 驅動)
                                </h2>
                                <span className="text-xs bg-emerald-100 px-2 py-1 rounded-full text-emerald-700 uppercase tracking-wider font-bold animate-pulse">實時地圖連結</span>
                            </div>

                            <div className="relative aspect-[4/3] bg-slate-200 rounded-xl overflow-hidden border border-slate-300 shadow-inner">
                                <iframe 
                                    src={mapEmbedUrl}
                                    className="absolute inset-0 w-full h-full grayscale-[20%] opacity-90 transition-opacity duration-500"
                                    style={{ border: 0 }}
                                    allowFullScreen=""
                                    loading="lazy"
                                    title="Google Map Background"
                                ></iframe>
                                
                                <div className="absolute inset-0 pointer-events-none">
                                    {churchesData.map((church, idx) => (
                                        <div
                                            key={church.id}
                                            className={`absolute transition-all duration-700 transform -translate-x-1/2 -translate-y-1/2`}
                                            style={{ left: `${church.coords.x}%`, top: `${church.coords.y}%` }}
                                        >
                                            <div className={`p-1.5 rounded-full shadow-2xl border-2 border-white transition-all ${activeTab === idx ? `${church.color} scale-110 z-20` : 'bg-slate-400 opacity-0 z-10'}`}>
                                                <Icons.MapPin size={activeTab === idx ? 24 : 0} className="text-white" />
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="absolute top-4 right-4 bg-black/60 backdrop-blur-md text-white text-[10px] px-3 py-1.5 rounded-full font-medium">
                                    經緯度: {currentChurch.lat.toFixed(4)}, {currentChurch.lng.toFixed(4)}
                                </div>
                                
                                <div className="absolute bottom-4 left-4 text-[10px] text-white bg-black/40 px-2 py-1 rounded-md">
                                    * 背景為該教會遺址之衛星即時影像
                                </div>
                            </div>
                            
                            <div className="mt-4 flex flex-wrap gap-2">
                                {churchesData.map((church, idx) => (
                                    <button
                                        key={church.id}
                                        onClick={() => setActiveTab(idx)}
                                        className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all border ${activeTab === idx ? `${church.color} text-white border-transparent shadow-md scale-105` : 'bg-white text-slate-500 border-slate-200 hover:border-slate-400'}`}
                                    >
                                        {church.name.split(' ')[0]}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                                <div className={`h-3 w-full ${currentChurch.color}`}></div>
                                <div className="p-8">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-1">教會 {currentChurch.id} / 7</h3>
                                            <h2 className="text-3xl font-extrabold text-slate-800">{currentChurch.name}</h2>
                                        </div>
                                        <div className={`p-3 rounded-xl ${currentChurch.color.replace('bg-', 'bg-opacity-10 text-')}`}>
                                            <Icons.Info size={28} />
                                        </div>
                                    </div>

                                    <div className="space-y-6 text-left">
                                        <section>
                                            <h4 className="text-sm font-bold text-slate-400 flex items-center gap-2 mb-2 uppercase tracking-wide">
                                                <Icons.MapPin size={14} /> 現代地理位置
                                            </h4>
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-between items-center">
                                                <div>
                                                    <p className="font-bold text-slate-700">{currentChurch.turkishName}</p>
                                                    <p className="text-sm text-slate-500 mt-1">{currentChurch.location}</p>
                                                </div>
                                                <a 
                                                    href={googleMapLink} 
                                                    target="_blank" 
                                                    rel="noopener noreferrer"
                                                    className="flex items-center gap-1.5 text-xs font-bold text-blue-600 hover:text-blue-800 bg-blue-50 px-3 py-2 rounded-lg transition-colors border border-blue-100"
                                                >
                                                    開啟 Google 地圖
                                                    <Icons.ExternalLink size={14} />
                                                </a>
                                            </div>
                                        </section>

                                        <section>
                                            <h4 className="text-sm font-bold text-slate-400 flex items-center gap-2 mb-2 uppercase tracking-wide">
                                                <Icons.BookOpen size={14} /> 聖經與考古背景
                                            </h4>
                                            <p className="text-slate-700 leading-relaxed italic border-l-4 border-slate-200 pl-4 py-1">
                                                "{currentChurch.description}"
                                            </p>
                                        </section>

                                        <section>
                                            <h4 className="text-sm font-bold text-slate-400 flex items-center gap-2 mb-2 uppercase tracking-wide">
                                                <Icons.Info size={14} /> 現今現況
                                            </h4>
                                            <p className="text-slate-600 leading-relaxed">
                                                {currentChurch.modernContext}
                                            </p>
                                        </section>
                                    </div>

                                    <div className="mt-10 flex items-center justify-between pt-6 border-t border-slate-100">
                                        <button 
                                            onClick={prevSlide}
                                            className="p-3 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-800 transition-colors"
                                        >
                                            <Icons.ChevronLeft size={24} />
                                        </button>
                                        
                                        <div className="flex gap-1">
                                            {churchesData.map((_, idx) => (
                                                <div 
                                                    key={idx}
                                                    className={`h-1.5 rounded-full transition-all duration-300 ${activeTab === idx ? `w-6 ${currentChurch.color}` : 'w-2 bg-slate-200'}`}
                                                ></div>
                                            ))}
                                        </div>

                                        <button 
                                            onClick={nextSlide}
                                            className="p-3 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-800 transition-colors"
                                        >
                                            <Icons.ChevronRight size={24} />
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-900 text-white rounded-2xl p-6 shadow-lg border border-slate-700">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="p-2 bg-blue-600 rounded-lg">
                                        <Icons.MapIcon size={20} />
                                    </div>
                                    <h4 className="text-sm font-bold uppercase tracking-widest text-left">地理坐標速查</h4>
                                </div>
                                <div className="grid grid-cols-1 gap-2 text-left">
                                   {churchesData.map((church, idx) => (
                                    <div key={idx} className={`flex justify-between items-center p-2 rounded-lg text-xs ${activeTab === idx ? 'bg-slate-800 border border-slate-700' : 'opacity-60'}`}>
                                      <span>{idx+1}. {church.name.split(' ')[0]}</span>
                                      <code className="text-[10px] text-emerald-400">{church.lat.toFixed(2)}°N, {church.lng.toFixed(2)}°E</code>
                                    </div>
                                   ))}
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="max-w-6xl mx-auto mt-12 text-center text-slate-400 text-sm">
                        <p>© 2024 啟示錄地理研究互動簡報系統 - Google Map 衛星聯網版</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
